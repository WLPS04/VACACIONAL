<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Páginas de Estudiantes</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(to right, #4facfe, #00f2fe);
}

header{
background:white;
padding:20px;
text-align:center;
box-shadow:0px 2px 10px rgba(0,0,0,0.2);
}

header h1{
margin:0;
color:#333;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
background:#333;
}

.menu button{
background:none;
border:none;
color:white;
padding:15px 20px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.menu button:hover{
background:#4facfe;
}

.contenido{
display:none;
padding:20px;
}

iframe{
width:100%;
height:600px;
border:none;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

.activo{
display:block;
}

</style>
</head>

<body>
<header>
<h1>🌟 Páginas Web de Estudiantes</h1>
<p>Haz clic en el nombre para ver cada página</p>
</header>

<div class="menu">
<button onclick="mostrar('est1')">Zara, Daniela y Nicol</button>
<button onclick="mostrar('est2')">Yordy, Kenet y Diego</button>
<button onclick="mostrar('est3')">Maykel y Dylan </button>

</div>


<!-- Estudiante 1 -->
<div id="est1" class="contenido activo">
<iframe src="index2.html"></iframe>
</div>


<!-- Estudiante 2 -->
<div id="est2" class="contenido">
<iframe src="index3.html"></iframe>
</div>


<!-- Estudiante 3 -->
<div id="est3" class="contenido">
<iframe src="index4.html"></iframe>
</div>


<!-- Estudiante 4 -->
<div id="est4" class="contenido">
<iframe src="luis.html"></iframe>
</div>


<script>

function mostrar(id){

var paginas = document.querySelectorAll('.contenido');

paginas.forEach(function(pagina){
pagina.classList.remove('activo');
});


document.getElementById(id).classList.add('activo');

}

</script>

</body>
</html>
